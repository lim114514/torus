# Do not edit this value. It is used to auto-update config.
config_version: 3

# Sets a language pack to be used. You can check language packs available by default here:
# https://github.com/alantr7/torus/tree/master/src/main/resources/locales
#
# You can also create your own or edit an existing language pack quite easily. Read more about it on the wiki:
# https://alantr7.github.io/torus-docs/
locale: 'en'

world_blacklist:
  - world_nether
  - world_the_end

# Prevents integration between Torus and supported plugins. For example, if you have WorldGuard installed but don't want
# Torus to check place and break permissions for players in claimed regions, you can add it to the list like:
# integration_blacklist:
#   - WorldGuard
# Names are case sensitive!
integration_blacklist: []

customization:
  # Enabling this will load models from '/plugins/Torus/configs/torus/structures' after server restart.
  # Use '/torus export_model <structure_id>' to save a model file, that can be edited, to the destination mentioned above.
  # Keep in mind that you will not receive automatic model updates if this option is enabled. You will still get models for new structures.
  enable_model_editing: false

# THIS FEATURE IS EXPERIMENTAL! Enabling virtualization will load ALL structures in configured worlds on server startup. Only structures
# that are listed in "allowed_structures" will be ticked while others are just idle.
EXPERIMENTAL_virtualization:
  enabled: false
  allowed_worlds:
    - world
  allowed_structures:
    - "torus:solar_generator"
    - "torus:coal_generator"
    - "torus:energy_cable"
    - "torus:item_conduit"
    - "torus:fluid_pipe"

logs:
  world_save: true
  recipe_load: true

# If enabled, the plugin will check for the latest version and notify admins if there is an update available.
allow_update_checks: true