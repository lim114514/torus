config_version: 2

general_settings:
  enabled: true
  display_name: "Pump"
  # When machine is placed on a block, it will be offset by this vector.
  # This vector is facing the positive Z direction. Rotation will be automatically applied.
  placement_offset: [0, 0, 0]
  # If set to true, structure can be broken only with a hammer.
  heavy: true
  portable_data: [ "energy", "fluid", "amount" ]

energy_settings:
  consumption: 50 # (default: 50)
  capacity: 500 # (default: 500)
  maximum_input: 25 # (default: 25)

fluid_settings:
  capacity: 1000 # (default: 1000)

special_settings:
  maximum_pipe_length: 32 # (default: 32)

info_hologram:
  offset: [0, 1, 0] # Location of the TextDisplay relative to the structure
  translation: [1.2, 0, 0] # Translation applied to TextDisplay

model_controller:
  type: SINGLEPART
  cases:
    fallback:
      model: "pump.model.yml"