general_settings:
  enabled: true
  display_name: "Solar Generator"
  # When machine is placed on a block, it will be offset by this vector.
  # This vector is facing the positive Z direction. Rotation will be automatically applied.
  placement_offset: [0, 0, 0]
  # If set to true, structure can be broken only with a hammer.
  heavy: true
  portable_data: [ "energy" ]

energy_settings:
  production: 50 # Energy produced each Torus tick (default: 50)
  capacity: 2000 # (default: 2000)
  maximum_output: 100 # (default: 100)

info_hologram:
  offset: [0, 1, 0] # Location of the TextDisplay relative to the structure
  translation: [1.2, 0, 0] # Translation applied to TextDisplay

model_controller:
  type: SINGLEPART
  cases:
    fallback:
      model: "solar_generator.model.yml"