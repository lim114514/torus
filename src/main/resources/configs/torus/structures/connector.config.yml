config_version: 2

general_settings:
  enabled: true
  display_name: "Connector"
  # When machine is placed on a block, it will be offset by this vector.
  # This vector is facing the positive Z direction. Rotation will be automatically applied.
  placement_offset: [0, 0, 0]
  # If set to true, structure can be broken only with a hammer.
  heavy: false
  portable_data: [ "flow", "filter" ]

info_hologram:
  offset: [0, 0, 0] # Location of the TextDisplay relative to the structure
  translation: [1.2, 0, 0] # Translation applied to TextDisplay

model_controller:
  type: MULTIPART
  cases:
    fallback:
      model: "connector_socket.model.yml"
    state[front=true]:
      model: "item_cable_north.model.yml"
    state[right=true]:
      model: "item_cable_east.model.yml"
    state[back=true]:
      model: "item_cable_south.model.yml"
    state[left=true]:
      model: "item_cable_west.model.yml"
    state[up=true]:
      model: "item_cable_up.model.yml"
    state[down=true]:
      model: "item_cable_down.model.yml"